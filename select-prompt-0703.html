<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Prompt — 프롬프트 선택 화면 프로토타입</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1a1a1a; --line:#1a1a1a; --line-soft:#c9c9c9; --line-hair:#e3e3e3;
    --muted:#6b6b6b; --muted2:#9a9a9a; --bg:#ffffff; --hover:#f7f7f7;
    --grp:#f2f2f2;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:#ececec; color:var(--ink);
    font-family:"Noto Sans KR","Noto Sans",system-ui,-apple-system,sans-serif;
    font-size:13px; line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  .num,.en{font-family:"Noto Sans","Noto Sans KR",sans-serif;}
  button{font-family:inherit; cursor:pointer;}
  .hidden{display:none !important;}

  .frame{max-width:1360px; height:calc(100vh - 48px); margin:24px auto; background:var(--bg); border:1px solid var(--line);
    padding:26px 30px 34px; display:flex; flex-direction:column;}

  /* ── Top bar ── */
  .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;}
  .topbar .title{font-size:26px; font-weight:700; letter-spacing:-.3px;}
  .topbar .right{display:flex; align-items:center; gap:18px;}
  .counter{font-size:13px; color:var(--muted);}
  .counter b{color:var(--ink); font-family:"Noto Sans"; font-weight:700; font-size:15px;}
  .btn-start{border:1.5px solid var(--line); background:#fff; border-radius:14px;
    padding:14px 30px; font-size:16px; font-weight:500; color:var(--ink); white-space:nowrap;}
  .btn-start:hover{background:var(--ink); color:#fff;}
  .btn-start:disabled{border-color:var(--line-soft); color:var(--muted2); cursor:not-allowed; background:#fff;}

  /* ── View tabs ── */
  .vtabs{display:flex; gap:0; border:1px solid var(--line); border-radius:0; overflow:hidden; margin-bottom:22px; width:fit-content;}
  .vtab{padding:10px 20px; font-size:13px; font-weight:500; color:var(--muted); background:#fff;
    border-right:1px solid var(--line); white-space:nowrap;}
  .vtab:last-child{border-right:none;}
  .vtab .no{font-family:"Noto Sans"; font-weight:700; margin-right:6px;}
  .vtab.active{background:var(--ink); color:#fff;}
  .vtab:not(.active):hover{background:var(--hover);}

  .hint{font-size:12px; color:var(--muted2); margin:-10px 0 16px;}

  /* ── Generic wireframe table ── */
  .wtbl{width:100%; border-collapse:collapse; border:1px solid var(--line); font-size:13px; background:#fff;}
  .wtbl th{background:#fff; text-align:left; font-weight:500; color:var(--ink); padding:12px 16px;
    border-bottom:1px solid var(--line); font-size:13px;}
  .wtbl th.c,.wtbl td.c{text-align:center; width:76px;}
  .wtbl th.vol,.wtbl td.vol{text-align:right; width:110px; font-family:"Noto Sans"; padding-right:20px;}
  .wtbl td{padding:11px 16px; border-bottom:1px solid var(--line-hair); vertical-align:middle; color:var(--ink);}
  .wtbl tr:last-child td{border-bottom:none;}

  /* group (accordion) row */
  .grp-row > td{background:var(--grp); border-bottom:1px solid var(--line-soft); font-weight:700; cursor:pointer;}
  .grp-row .caret{display:inline-block; width:14px; font-size:11px; color:var(--ink); transition:transform .12s;}
  .grp-row .gname{font-weight:700;}
  .grp-row .gsub{font-weight:400; color:var(--muted); font-size:12px; margin-left:8px;}
  .child-row td{padding-left:44px; color:var(--muted);}
  .child-row td:first-child{color:var(--muted);}
  .child-row .ptxt{color:var(--ink); font-weight:400; max-width:none;}
  .cep-badge{display:inline-flex; align-items:center; justify-content:center; min-width:44px; padding:2px 8px;
    border:1px solid var(--line-soft); border-radius:11px; font-size:11px; font-family:"Noto Sans"; font-weight:700; color:var(--muted);}
  .oos{font-size:11px; color:var(--muted2); border:1px dashed var(--line-soft); border-radius:4px; padding:1px 6px; margin-left:8px;}

  /* checkbox */
  input[type=checkbox]{width:17px; height:17px; accent-color:var(--ink); cursor:pointer; margin:0; vertical-align:middle;}

  .scroll-area{flex:1; min-height:0; overflow-y:auto; border:1px solid var(--line);}
  .scroll-area .wtbl{border:none;}
  .scroll-area .wtbl thead th{position:sticky; top:0; z-index:2; box-shadow:inset 0 -1px 0 var(--line);}
  ::-webkit-scrollbar{width:10px; height:10px;}
  ::-webkit-scrollbar-thumb{background:var(--line-soft); border-radius:8px;}
  ::-webkit-scrollbar-track{background:transparent;}

  /* ── 2-column shell: view content + shared basket ── */
  .main{display:grid; grid-template-columns:1fr 370px; grid-template-rows:minmax(0,1fr); gap:20px; align-items:stretch; flex:1; min-height:0;}
  .main-left{min-width:0; min-height:0; display:flex; flex-direction:column;}
  .main-left > .view:not(.hidden){display:flex; flex-direction:column; flex:1; min-height:0;}

  /* ── View 4: topic cards ── */
  .cards-scroll{max-height:620px; overflow-y:auto; padding-right:4px;}
  .cards-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  .tcard{border:1px solid var(--line); background:#fff; display:flex; flex-direction:column; max-height:320px;}
  .tcard-h{display:flex; align-items:center; gap:8px; padding:10px 14px; border-bottom:1px solid var(--line);
    background:#fff; cursor:pointer;}
  .tcard-h .caret{width:12px; font-size:10px;}
  .tcard-h .tname{font-weight:700; flex:1; font-size:13px;}
  .tcard-h .tcnt{font-size:11px; color:var(--muted); font-family:"Noto Sans";}
  .tcard-body{overflow-y:auto;}
  .tcard-body table{width:100%; border-collapse:collapse; font-size:12.5px;}
  .tcard-body td{padding:8px 12px; border-bottom:1px solid var(--line-hair); vertical-align:middle;}
  .tcard-body tr:last-child td{border-bottom:none;}
  .tcard-body td.pc{color:var(--ink);}
  .tcard-body td.cc{width:52px; text-align:center;}
  .tcard-body td.kc{width:40px; text-align:center;}

  .basket{border:1px solid var(--line); background:#fff; display:flex; flex-direction:column; min-height:0;}
  .basket-h{padding:12px 14px; border-bottom:1px solid var(--line); font-weight:700; display:flex; justify-content:space-between; align-items:center;}
  .basket-h .bc{font-family:"Noto Sans"; color:var(--muted); font-weight:700;}
  .btn-clear{border:1px solid var(--line-soft); background:#fff; border-radius:12px; padding:4px 11px;
    font-size:11.5px; font-weight:500; color:var(--muted);}
  .btn-clear:hover:not(:disabled){border-color:var(--line); color:var(--ink);}
  .btn-clear:disabled{color:var(--muted2); border-color:var(--line-hair); cursor:not-allowed;}
  .basket-scroll{flex:1; overflow-y:auto;}
  .basket table{width:100%; border-collapse:collapse; font-size:12.5px;}
  .basket thead th{position:sticky; top:0; background:#fff; text-align:left; font-weight:500; color:var(--muted);
    padding:9px 12px; border-bottom:1px solid var(--line); font-size:12px;}
  .basket thead th.c{text-align:center; width:44px;}
  .basket thead th.c.cp-h{width:52px;}
  .basket tbody td{padding:9px 12px; border-bottom:1px solid var(--line-hair); vertical-align:middle;}
  .basket tbody td.cp{text-align:center; white-space:nowrap; width:52px; font-family:"Noto Sans"; font-size:11.5px; color:var(--muted);}
  .basket tbody td.tp{color:var(--muted); white-space:nowrap; width:120px; font-size:11.5px;}
  .basket tbody td.dn{text-align:center; width:44px;}
  .basket .trash{border:none; background:none; font-size:15px; color:var(--muted); padding:2px 6px;}
  .basket .trash:hover{color:var(--ink);}
  .basket-empty{padding:40px 16px; text-align:center; color:var(--muted2); font-size:12.5px;}
  .basket-foot{padding:14px; border-top:1px solid var(--line);}
  .basket-foot .btn-start{width:100%; text-align:center; border-radius:10px;}

  .prompt-cell{max-width:640px; line-height:1.55;}

  /* ── 알럿 모달 (showAlert) ── */
  .modal-overlay{position:fixed; inset:0; background:rgba(26,26,26,.32); display:none;
    align-items:center; justify-content:center; z-index:200;}
  .modal-overlay.show{display:flex;}
  .modal{background:#fff; border:1px solid var(--line); min-width:300px; max-width:400px;
    box-shadow:0 10px 34px rgba(0,0,0,.18);}
  .modal-msg{margin:0; padding:26px 26px 22px; font-size:14px; color:var(--ink); line-height:1.6; text-align:center;}
  .modal-foot{border-top:1px solid var(--line-hair); display:flex; justify-content:center; padding:12px;}
  .modal-ok{border:1.5px solid var(--line); background:#fff; border-radius:10px; padding:9px 30px;
    font-size:13px; font-weight:500; color:var(--ink);}
  .modal-ok:hover{background:var(--ink); color:#fff;}
</style>
</head>
<body>
<div class="frame">

  <!-- Top bar -->
  <div class="topbar">
    <div class="title">Select Prompt</div>
    <div class="right">
      <div class="counter">선택 10~20개 · 현재 <b id="selCount">0</b>개</div>
      <button class="btn-start" id="btnStart">Start Analyze</button>
    </div>
  </div>

  <!-- View switcher (②전체 단일 채택 — 탭 숨김) -->
  <div class="vtabs hidden" id="vtabs">
    <div class="vtab active" data-v="cep"><span class="no">①</span>CEP별</div>
    <div class="vtab" data-v="all"><span class="no">②</span>전체</div>
    <div class="vtab" data-v="topic"><span class="no">③</span>토픽별</div>
    <div class="vtab" data-v="card"><span class="no">④</span>토픽 카드</div>
  </div>
  <div class="hint" id="viewHint"></div>

  <div class="main">
    <div class="main-left">
      <!-- ① CEP accordion -->
      <div id="view-cep" class="view">
        <table class="wtbl">
          <thead><tr><th>CEP</th><th class="vol">Volume</th><th class="c">Accept</th></tr></thead>
          <tbody id="cepBody"></tbody>
        </table>
      </div>

      <!-- ② Flat list -->
      <div id="view-all" class="view hidden">
        <div class="scroll-area">
          <table class="wtbl">
            <thead><tr><th>Suggest Prompt</th><th class="c">CEP</th><th class="c">Accept</th></tr></thead>
            <tbody id="allBody"></tbody>
          </table>
        </div>
      </div>

      <!-- ③ Topic accordion -->
      <div id="view-topic" class="view hidden">
        <table class="wtbl">
          <thead><tr><th>TOPIC</th><th class="c">CEP</th><th class="c">Accept</th></tr></thead>
          <tbody id="topicBody"></tbody>
        </table>
      </div>

      <!-- ④ Topic cards -->
      <div id="view-card" class="view hidden">
        <div class="cards-scroll"><div class="cards-grid" id="cardGrid"></div></div>
      </div>
    </div>

    <!-- 공용 선택 바구니 (①~④ 상시 노출) -->
    <aside class="basket">
      <div class="basket-h"><span>Selected Prompt <span class="bc" id="basketCnt">0</span></span><button class="btn-clear" id="btnClear" disabled>전체 해제</button></div>
      <div class="basket-scroll" id="basketScroll"></div>
      <div class="basket-foot"><button class="btn-start" id="btnStart2">Start Analyze</button></div>
    </aside>
  </div>

</div>

<!-- 알럿 모달 (프로젝트 showAlert 대응) -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" role="alertdialog" aria-modal="true">
    <p class="modal-msg" id="modalMsg"></p>
    <div class="modal-foot"><button class="modal-ok" id="modalOk">확인</button></div>
  </div>
</div>

<script>
/* ═══════════════ DATA — prompt.md 실측 (20 CEP × 9 prompt = 180) ═══════════════ */
const CEPS = [
  {no:1, volume:1219, prompts:[
    "이 제품 저소음 클릭 스위치가 실제로 어느 정도 수준으로 조용한 편이야? (대략적인 dB나 후기 기준으로 알려줘)",
    "저소음 클릭 스위치 적용된 모델이랑 일반 모델이랑 소음 차이가 체감돼? 회의실/독서실에서 써도 괜찮을까?",
    "클릭 소음이 줄어들도록 설계된 스위치 수명이나 내구성은 어때? 오래 써도 계속 조용해?",
    "버튼을 누를 때 '탁' 하고 나는 소리가 아니라 '부드럽게' 눌리는 구조(스위치 방식) 맞아? 어떤 방식인지 궁금해",
    "이 키보드/마우스는 클릭 소음 말고도 더미 소리(스프링, 스크래치 같은 잡음)는 줄였어?",
    "회의실에서 눈치 덜 보이게 하려면 클릭 방식이 어떤 게 좋아? (예: 리니어/택틸/아날로그 등) 이 제품이 그에 맞아?",
    "휠 스크롤이 조용한 '스마트휠/소음 적은 스크롤 기구' 맞아? 실제로 얼마나 덜 시끄러워?",
    "정밀 스크롤이나 큰 스크롤할 때도 휠 소음이 크게 안 나? 도서관/회의실에서 돌아가는 소리 걱정돼서",
    "이 제품이 무소음에 가까운 편이야, 아니면 클릭은 조용해도 휠 소음이 남는 편이야?",
  ]},
  {no:2, volume:541, prompts:[
    "평일 퇴근길 지하철 손잡이 잡을 때 손목에 찌릿/뻐근 통증이 올라오는데, 세로형 인체공학 그립 구조가 이런 통증 줄이는데 도움이 될까?",
    "일상에서 손으로 물건 잡는 습관 때문에 손목이 뻐근한 편인데, 세로형 그립이 일반 그립이랑 비교해서 어떤 점이 달라?",
    "세로형 인체공학 그립을 쓰면 손목 부담이 줄어서 통증이 '체감'되는 데 보통 어느 정도 걸려?",
    "손 크기별 그립 핏 때문에 고민 중인데, 내 손에 맞는 사이즈를 어떻게 고르면 좋아?",
    "장갑은 S/M 중 뭐가 잘 맞는데, 그립도 비슷하게 고르면 될까? 손 치수 기준으로 추천해줄 수 있어?",
    "손목 통증이 있는 사람은 세로형 그립을 고를 때 사이즈를 작게/크게 잡는 게 유리한지, 안전한 범위가 있을까?",
    "손목 지지에 유리한 폼(높이/전면 경사) 차이가 실제로 통증 완화에 영향 있어?",
    "그립 높이랑 전면 경사를 어떤 조합으로 선택해야 손목이 덜 꺾이고 덜 아플까?",
    "다음 주까지 써보고 체감할 수 있게 고르려면, 폼 높이/전면 경사 스펙에서 뭐를 우선순위로 보면 돼?",
  ]},
  {no:3, volume:439, prompts:[
    "어르고노믹 키보드 틴팅(각도) 세팅 맞출 때, 손목 각도도 같이 자연스럽게 맞추는 기준이 뭐야?",
    "손목 긴장 줄이려면 키보드 각도(틸팅)랑 손목 각도를 어떤 식으로 같이 조절하면 좋아?",
    "내가 편한 손목 각도 기준으로 키보드 틴팅/각도를 잡는 방법이랑 추천 세팅 범위 알려줄 수 있어?",
    "마우스는 하우징 기울기나 전면 경사(앞쪽이 올라가는 각도)로 손목 각도가 얼마나 달라져? 어떤 각도로 맞추는 게 좋아?",
    "키보드 각도에 맞춰 마우스 손목 각도까지 같이 맞출 때, 책상/마우스 위치는 어떻게 잡아야 해?",
    "마우스 각도 조절되는 제품을 고를 때 '손목 각도 기준'으로 봐야 할 스펙이나 체크포인트가 뭐야?",
    "키보드 틴팅 세팅에 맞춰 위치를 잡기 쉽게 해주는 마우스 하부 높이/바닥 면 구조는 어떤 게 편해?",
    "마우스 바닥 면(높이, 기울기, 스탠드 구조) 차이가 그립감이랑 자세 안정감에 어떤 영향을 줘?",
    "어르고노믹 그립을 유지하려면 손가락/엄지 지지 형태(버튼 배치 포함)를 어떤 스타일로 선택하는 게 좋아?",
  ]},
  {no:4, volume:433, prompts:[
    "집 노트북과 회사 노트북을 번갈아 쓸 건데, 블루투스랑 USB 동글(수신기)을 동시에 지원하는 마우스 추천해줄 수 있어?",
    "듀얼 연결(블루투스 + 2.4GHz 동글) 되는 무선 마우스를 찾고 있는데, PC/노트북 환경에서 멀티페어링 방식이 어떻게 동작하는지 설명해줘.",
    "여러 기기 동시에 연결해두고 전환하는 기능이 있는지(블루투스+동글 조합 포함) 확인할 수 있는 체크리스트 만들어줄래?",
    "노트북 두 대를 번갈아 쓸 때 버튼 한 번으로 바로 전환되는 듀얼 무선/페어링 구조가 어떤 모델들이 좋은 편이야?",
    "'채널 전환 버튼'이 실제로 얼마나 빨리 바뀌는지(집-회사 반복 사용 기준) 비교할 만한 기준이 있을까?",
    "페어링을 자꾸 다시 안 하게 해주는 방식(예: 버튼으로 프로필 고정, 자동 재연결)이 어떤 마우스에서 잘 되는지 알려줘.",
    "2.4GHz(동글)랑 블루투스 중에서 집/회사에서 끊김이 덜한 쪽이 뭐야? 어떤 프로토콜/전송 방식이 안정에 유리해?",
    "무선 끊김 줄이려고 보면 좋은 기술(폴링레이트, 로우턴치, 센서/전송 설계 등)이 뭐가 있는지 추천 기준으로 정리해줄래?",

/* ═══════════════ STATE ═══════════════ */
const CEP_BY_NO = {}; CEPS.forEach(c=>CEP_BY_NO[c.no]=c);
const TOTAL = CEPS.reduce((s,c)=>s+c.prompts.length,0);
const MIN = 10;                        // 선택해야 하는 최소 프롬프트 수
const MAX = 20;                        // 선택 가능한 최대 프롬프트 수
const selected = new Set();            // key = "cep-idx"
const key = (cep,idx)=>cep+"-"+idx;
const fmt = n => n.toLocaleString("en-US");

/* topic lookup: for each cep → topic name (첫 매칭) */
const CEP_TOPIC = {};
TOPICS.forEach(t=>t.ceps.forEach(n=>{ if(!(n in CEP_TOPIC)) CEP_TOPIC[n]=t.name; }));

/* ═══════════════ HELPERS ═══════════════ */
const $ = s => document.querySelector(s);
const el = (t,cls,html)=>{const e=document.createElement(t); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e;};

/* 알럿 모달 (프로젝트의 showAlert 대응) — 경고/검증 미달 안내 전용 */
function showAlert(msg){ $("#modalMsg").textContent=msg; $("#modalOverlay").classList.add("show"); }
function closeAlert(){ $("#modalOverlay").classList.remove("show"); }
/* 전체선택용: 앞에서부터 MAX까지만 담고 나머지는 조용히 버림(모달/토스트 없음) */
function addCapped(keys){
  for(const k of keys){
    if(selected.size>=MAX) break;
    selected.add(k);
  }
}

function allKeys(){ const a=[]; CEPS.forEach(c=>c.prompts.forEach((_,i)=>a.push(key(c.no,i)))); return a; }
function cepKeys(no){ return CEP_BY_NO[no].prompts.map((_,i)=>key(no,i)); }
function topicKeys(t){ const a=[]; t.ceps.forEach(no=>{ if(CEP_BY_NO[no]) a.push(...cepKeys(no)); }); return a; }
function countSel(keys){ return keys.reduce((s,k)=>s+(selected.has(k)?1:0),0); }

function setGroupBox(box, keys){
  const n=countSel(keys);
  box.checked = n>0 && n===keys.length;
  box.indeterminate = n>0 && n<keys.length;
}

function updateCounter(){
  $("#selCount").textContent = selected.size;
  // Start 버튼은 상시 활성(클릭 시 최소 10개 검증). 전체 해제만 0개일 때 비활성.
  const bc=$("#btnClear"); if(bc) bc.disabled = selected.size===0;
}

/* ═══════════════ ① CEP ACCORDION ═══════════════ */
function renderCEP(){
  const tb=$("#cepBody"); tb.innerHTML="";
  CEPS.forEach((c,ci)=>{
    const open = ci===0;
    // group row
    const gr=el("tr","grp-row"); gr.dataset.cep=c.no;
    gr.innerHTML =
      `<td><span class="caret">${open?"▼":"▶"}</span><span class="gname">CEP ${c.no}</span>`+
      `<span class="gsub">프롬프트 ${c.prompts.length}개 · ${CEP_TOPIC[c.no]||"-"}</span></td>`+
      `<td class="vol">${fmt(c.volume)}</td>`+
      `<td class="c"><input type="checkbox" class="cep-all" data-cep="${c.no}"></td>`;
    tb.appendChild(gr);
    // child rows
    c.prompts.forEach((p,idx)=>{
      const cr=el("tr","child-row"+(open?"":" hidden")); cr.dataset.cep=c.no;
      const k=key(c.no,idx);
      cr.innerHTML =
        `<td class="ptxt prompt-cell">${p}</td>`+
        `<td class="vol"></td>`+
        `<td class="c"><input type="checkbox" class="leaf" data-key="${k}" ${selected.has(k)?"checked":""}></td>`;
      tb.appendChild(cr);
    });
  });
  // caret toggle
  tb.querySelectorAll(".grp-row").forEach(gr=>{
    gr.addEventListener("click",e=>{
      if(e.target.closest("input")) return;
      const no=gr.dataset.cep, caret=gr.querySelector(".caret");
      const openNow = caret.textContent==="▼";
      caret.textContent = openNow?"▶":"▼";
      tb.querySelectorAll(`.child-row[data-cep="${no}"]`).forEach(r=>r.classList.toggle("hidden",openNow));
    });
  });
  syncCEP();
}
function syncCEP(){
  CEPS.forEach(c=>{
    const box=$(`#cepBody .cep-all[data-cep="${c.no}"]`);
    if(box) setGroupBox(box, cepKeys(c.no));
  });
}

/* ═══════════════ ② FLAT LIST ═══════════════ */
function renderAll(){
  const tb=$("#allBody"); tb.innerHTML="";
  // header select-all row
  const hr=el("tr","grp-row");
  hr.innerHTML=`<td><span class="gname">전체 프롬프트</span><span class="gsub">${TOTAL}개</span></td>`+
    `<td class="c"></td>`+
    `<td class="c"><input type="checkbox" id="allBox"></td>`;
  tb.appendChild(hr);
  CEPS.forEach(c=>c.prompts.forEach((p,idx)=>{
    const k=key(c.no,idx);
    const tr=el("tr");
    tr.innerHTML=`<td class="prompt-cell">${p}</td>`+
      `<td class="c"><span class="cep-badge">CEP ${c.no}</span></td>`+
      `<td class="c"><input type="checkbox" class="leaf" data-key="${k}" ${selected.has(k)?"checked":""}></td>`;
    tb.appendChild(tr);
  }));
  $("#allBox").addEventListener("change",e=>{
    if(e.target.checked) addCapped(allKeys()); else allKeys().forEach(k=>selected.delete(k));
    refreshAll();
  });
  syncAll();
}
function syncAll(){ const b=$("#allBox"); if(b) setGroupBox(b, allKeys()); }

/* ═══════════════ ③ TOPIC ACCORDION ═══════════════ */
function renderTopic(){
  const tb=$("#topicBody"); tb.innerHTML="";
  TOPICS.forEach((t,ti)=>{
    const open = ti===0;
    const keys=topicKeys(t);
    const gr=el("tr","grp-row"); gr.dataset.topic=ti;
    gr.innerHTML=`<td><span class="caret">${open?"▼":"▶"}</span><span class="gname">${t.name}</span>`+
      `<span class="gsub">CEP ${t.ceps.join(", ")} · 프롬프트 ${keys.length}개${t.oos?'<span class="oos">범위 외</span>':''}</span></td>`+
      `<td class="c"></td>`+
      `<td class="c"><input type="checkbox" class="topic-all" data-topic="${ti}"></td>`;
    tb.appendChild(gr);
    t.ceps.forEach(no=>{ if(!CEP_BY_NO[no]) return;
      CEP_BY_NO[no].prompts.forEach((p,idx)=>{
        const k=key(no,idx);
        const cr=el("tr","child-row"+(open?"":" hidden")); cr.dataset.topic=ti;
        cr.innerHTML=`<td class="ptxt prompt-cell">${p}</td>`+
          `<td class="c"><span class="cep-badge">CEP ${no}</span></td>`+
          `<td class="c"><input type="checkbox" class="leaf" data-key="${k}" ${selected.has(k)?"checked":""}></td>`;
        tb.appendChild(cr);
      });
    });
  });
  tb.querySelectorAll(".grp-row").forEach(gr=>{
    gr.addEventListener("click",e=>{
      if(e.target.closest("input")) return;
      const ti=gr.dataset.topic, caret=gr.querySelector(".caret");
      const openNow=caret.textContent==="▼";
      caret.textContent=openNow?"▶":"▼";
      tb.querySelectorAll(`.child-row[data-topic="${ti}"]`).forEach(r=>r.classList.toggle("hidden",openNow));
    });
  });
  syncTopic();
}
function syncTopic(){
  TOPICS.forEach((t,ti)=>{
    const box=$(`#topicBody .topic-all[data-topic="${ti}"]`);
    if(box) setGroupBox(box, topicKeys(t));
  });
}

/* ═══════════════ ④ TOPIC CARDS + BASKET ═══════════════ */
function renderCards(){
  const grid=$("#cardGrid"); grid.innerHTML="";
  TOPICS.forEach((t,ti)=>{
    const keys=topicKeys(t);
    const card=el("div","tcard");
    const head=el("div","tcard-h");
    head.innerHTML=`<span class="caret">▼</span><span class="tname">${t.name}${t.oos?' <span class="oos">범위 외</span>':''}</span>`+
      `<span class="tcnt">${keys.length}개</span>`+
      `<input type="checkbox" class="topic-all2" data-topic="${ti}">`;
    const body=el("div","tcard-body");
    const tbl=el("table"); const tbody=el("tbody");
    t.ceps.forEach(no=>{ if(!CEP_BY_NO[no]) return;
      CEP_BY_NO[no].prompts.forEach((p,idx)=>{
        const k=key(no,idx);
        const tr=el("tr");
        tr.innerHTML=`<td class="pc">${p}</td><td class="cc"><span class="cep-badge">CEP ${no}</span></td>`+
          `<td class="kc"><input type="checkbox" class="leaf" data-key="${k}" ${selected.has(k)?"checked":""}></td>`;
        tbody.appendChild(tr);
      });
    });
    tbl.appendChild(tbody); body.appendChild(tbl);
    // caret collapse
    head.addEventListener("click",e=>{
      if(e.target.closest("input")) return;
      const c=head.querySelector(".caret"); const openNow=c.textContent==="▼";
      c.textContent=openNow?"▶":"▼"; body.classList.toggle("hidden",openNow);
    });
    card.appendChild(head); card.appendChild(body); grid.appendChild(card);
  });
  syncCards();
  renderBasket();
}
function syncCards(){
  TOPICS.forEach((t,ti)=>{
    const box=$(`#cardGrid .topic-all2[data-topic="${ti}"]`);
    if(box) setGroupBox(box, topicKeys(t));
  });
}
function renderBasket(){
  const wrap=$("#basketScroll"); const arr=[...selected];
  $("#basketCnt").textContent=arr.length;
  if(arr.length===0){ wrap.innerHTML='<div class="basket-empty">선택된 프롬프트가 없습니다.<br>왼쪽에서 프롬프트를 선택하세요.</div>'; return; }
  // order by cep, idx
  arr.sort((a,b)=>{const[ca,ia]=a.split("-").map(Number),[cb,ib]=b.split("-").map(Number);return ca-cb||ia-ib;});
  let rows="";
  arr.forEach(k=>{
    const[no,idx]=k.split("-").map(Number);
    const p=CEP_BY_NO[no].prompts[idx];
    const short = p.length>46 ? p.slice(0,46)+"…" : p;
    rows+=`<tr><td title="${p.replace(/"/g,'&quot;')}">${short}</td>`+
      `<td class="cp">CEP${no}</td>`+
      `<td class="tp">${(CEP_TOPIC[no]||"-").replace(/^\d+\.\s*/,"")}</td>`+
      `<td class="dn"><button class="trash" data-key="${k}" title="제외">🗑</button></td></tr>`;
  });
  wrap.innerHTML=`<table><thead><tr><th>Selected Prompt</th><th class="c cp-h">CEP</th><th>Topic</th><th class="c">Deny</th></tr></thead><tbody>${rows}</tbody></table>`;
  wrap.querySelectorAll(".trash").forEach(btn=>{
    btn.addEventListener("click",()=>{ selected.delete(btn.dataset.key); refreshAllViews(); });
  });
}

/* ═══════════════ EVENT DELEGATION (leaf + group boxes) ═══════════════ */
function refreshLeaves(k){
  // sync any rendered leaf checkbox with the same key across views
  document.querySelectorAll(`.leaf[data-key="${k}"]`).forEach(cb=>cb.checked=selected.has(k));
}
function refreshAll(){
  document.querySelectorAll(".leaf").forEach(cb=>cb.checked=selected.has(cb.dataset.key));
  refreshGroups(); updateCounter(); renderBasket();
}
function refreshGroups(){ syncCEP(); syncAll(); syncTopic(); syncCards(); }
function refreshAllViews(){ refreshAll(); }

document.addEventListener("change",e=>{
  const cb=e.target;
  if(cb.classList.contains("leaf")){
    const k=cb.dataset.key;
    if(cb.checked){
      if(!selected.has(k) && selected.size>=MAX){ cb.checked=false; showAlert(`최대 ${MAX}개까지 선택할 수 있습니다.`); return; }
      selected.add(k);
    } else selected.delete(k);
    refreshAll(); return;
  }
  if(cb.classList.contains("cep-all")){
    const no=+cb.dataset.cep;
    if(cb.checked) addCapped(cepKeys(no)); else cepKeys(no).forEach(k=>selected.delete(k));
    refreshAll(); return;
  }
  if(cb.classList.contains("topic-all") || cb.classList.contains("topic-all2")){
    const t=TOPICS[+cb.dataset.topic];
    if(cb.checked) addCapped(topicKeys(t)); else topicKeys(t).forEach(k=>selected.delete(k));
    refreshAll(); return;
  }
});

/* ═══════════════ VIEW SWITCH ═══════════════ */
const VIEW_HINT = {
  cep:"CEP(장면) 기준으로 묶어 확장합니다. CEP 행의 체크박스로 해당 CEP의 프롬프트 9개를 일괄 선택할 수 있습니다.",
  all:"180개 프롬프트를 분류 없이 전부 나열합니다. 각 행에 소속 CEP를 표시합니다.",
  topic:"topic.md의 9개 KBF 토픽으로 재분류합니다. 하나의 토픽이 여러 CEP를 가로지릅니다.",
  card:"토픽을 카드로 펼쳐 훑어보고, 선택한 프롬프트를 오른쪽 바구니에서 확인·제외합니다.",
};
function switchView(v){
  document.querySelectorAll("#vtabs .vtab").forEach(t=>t.classList.toggle("active",t.dataset.v===v));
  ["cep","all","topic","card"].forEach(n=>$("#view-"+n).classList.toggle("hidden",n!==v));
  $("#viewHint").textContent = VIEW_HINT[v];
}
$("#vtabs").addEventListener("click",e=>{const t=e.target.closest(".vtab"); if(t) switchView(t.dataset.v);});

/* ═══════════════ START BUTTONS ═══════════════ */
function onStart(){
  if(selected.size < MIN){ showAlert(`최소 ${MIN}개를 선택해주세요.`); return; }
  // 검증 통과 → 결과 대시보드로 이동 (선택한 프롬프트 기준 분석)
  window.location.href = "prototype.html";
}
$("#btnStart").addEventListener("click",onStart);
$("#btnClear").addEventListener("click",()=>{ if(!selected.size) return; selected.clear(); refreshAll(); });
/* 모달 닫기: 확인 버튼 · 오버레이 클릭 */
$("#modalOk").addEventListener("click",closeAlert);
$("#modalOverlay").addEventListener("click",e=>{ if(e.target===$("#modalOverlay")) closeAlert(); });

/* ═══════════════ INIT ═══════════════ */
renderCEP(); renderAll(); renderTopic(); renderCards();
$("#btnStart2").addEventListener("click",onStart);   // rendered inside view-card
updateCounter();
switchView("all");
</script>
</body>
</html>
